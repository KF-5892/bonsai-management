services:
  postgres:
    image: postgres:16
    container_name: bonsai-postgres
    environment:
      POSTGRES_USER: bonsai
      POSTGRES_PASSWORD: bonsai
      POSTGRES_DB: bonsai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bonsai -d bonsai"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
