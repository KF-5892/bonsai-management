{% if messages %}
  <div class="mb-4 space-y-2">
    {% for message in messages %}
      <div
        x-data="{ show: true }"
        x-show="show"
        x-transition
        class="flex items-start justify-between gap-3 rounded-md border px-4 py-3 text-sm
          {% if message.tags == 'error' %}border-red-200 bg-red-50 text-red-800
          {% elif message.tags == 'warning' %}border-amber-200 bg-amber-50 text-amber-800
          {% elif message.tags == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-800
          {% else %}border-sky-200 bg-sky-50 text-sky-800{% endif %}"
        role="alert"
      >
        <span>{{ message }}</span>
        <button
          type="button"
          @click="show = false"
          class="text-current/70 hover:text-current"
          aria-label="閉じる"
        >
          ×
        </button>
      </div>
    {% endfor %}
  </div>
{% endif %}
