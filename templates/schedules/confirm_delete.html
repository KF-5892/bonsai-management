{% extends "base.html" %}

{% block title %}スケジュール削除確認 | 盆栽管理{% endblock %}

{% block content %}
  <div class="mx-auto max-w-md space-y-4">
    <h1 class="text-xl font-bold text-red-900">スケジュールを削除しますか？</h1>
    <p class="rounded-lg border border-red-200 bg-red-50 p-4 text-sm text-red-800">
      「{{ object }}」を削除します。
    </p>
    <form method="post" class="flex items-center justify-between">
      {% csrf_token %}
      <a href="{% url 'schedules:list' %}" class="text-sm text-gray-600 hover:underline">キャンセル</a>
      <button type="submit"
              class="rounded-md bg-red-600 px-4 py-2 text-sm font-semibold text-white shadow hover:bg-red-700">
        削除する
      </button>
    </form>
  </div>
{% endblock %}
