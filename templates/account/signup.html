{% extends "base.html" %}

{% block title %}新規登録 | 盆栽管理{% endblock %}

{% block content %}
  <div class="mx-auto max-w-sm space-y-6">
    <h1 class="text-center text-2xl font-bold text-emerald-900">新規登録</h1>

    <form method="post" action="{% url 'account_signup' %}" class="space-y-4 rounded-lg border border-emerald-100 bg-white p-5 shadow-sm">
      {% csrf_token %}
      <div class="space-y-3 [&_input]:w-full [&_input]:rounded-md [&_input]:border [&_input]:border-gray-300 [&_input]:px-3 [&_input]:py-2 [&_input]:text-sm [&_input:focus]:border-emerald-500 [&_input:focus]:outline-none [&_input:focus]:ring-1 [&_input:focus]:ring-emerald-500 [&_label]:mb-1 [&_label]:block [&_label]:text-sm [&_label]:font-medium [&_label]:text-gray-700">
        {{ form.as_p }}
      </div>

      {% if redirect_field_value %}
        <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
      {% endif %}

      <button
        type="submit"
        class="w-full rounded-md bg-emerald-600 px-4 py-2 text-sm font-semibold text-white shadow hover:bg-emerald-700"
      >
        登録する
      </button>
    </form>

    <p class="text-center text-sm text-gray-600">
      すでにアカウントをお持ちの方は
      <a href="{% url 'account_login' %}" class="font-medium text-emerald-700 hover:underline">ログイン</a>
    </p>
  </div>
{% endblock %}
