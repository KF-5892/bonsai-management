<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#ffffff",
              "error": "#ba1a1a",
              "surface-tint": "#1b6d24",
              "primary-container": "#2e7d32",
              "primary-fixed": "#a3f69c",
              "on-surface-variant": "#40493d",
              "outline": "#707a6c",
              "secondary-fixed": "#d5e8d0",
              "surface-container-highest": "#dfe3e0",
              "secondary": "#526350",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed": "#101f10",
              "surface": "#f6faf6",
              "secondary-fixed-dim": "#b9ccb5",
              "secondary-container": "#d2e5cd",
              "surface-bright": "#f6faf6",
              "inverse-primary": "#88d982",
              "primary-fixed-dim": "#88d982",
              "error-container": "#ffdad6",
              "tertiary-container": "#b14b6f",
              "on-secondary": "#ffffff",
              "on-error-container": "#93000a",
              "tertiary-fixed-dim": "#ffb1c7",
              "primary": "#0d631b",
              "on-tertiary-container": "#ffedf0",
              "on-surface": "#181d1a",
              "surface-variant": "#dfe3e0",
              "on-background": "#181d1a",
              "inverse-on-surface": "#eef2ee",
              "surface-dim": "#d7dbd7",
              "on-primary": "#ffffff",
              "on-primary-fixed": "#002204",
              "inverse-surface": "#2d312f",
              "tertiary": "#923357",
              "on-primary-fixed-variant": "#005312",
              "surface-container-high": "#e5e9e5",
              "surface-container-low": "#f1f5f1",
              "surface-container": "#ebefeb",
              "on-tertiary-fixed": "#3f001c",
              "on-secondary-fixed-variant": "#3b4b39",
              "tertiary-fixed": "#ffd9e2",
              "on-tertiary": "#ffffff",
              "on-secondary-container": "#566754",
              "outline-variant": "#bfcaba",
              "on-tertiary-fixed-variant": "#7f2448",
              "on-primary-container": "#cbffc2",
              "background": "#f6faf6"
            },
            fontFamily: {
              "headline": ["Inter", "Noto Sans JP"],
              "body": ["Inter", "Noto Sans JP"],
              "label": ["Inter", "Noto Sans JP"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen pb-32">
<!-- Top App Bar -->
<header class="w-full top-0 sticky z-40 flex items-center justify-between px-6 py-4 bg-[#f1f5f1] dark:bg-stone-900 transition-colors duration-200">
<div class="flex items-center gap-3">
<button class="text-green-800 dark:text-green-400 p-2 hover:bg-green-50 dark:hover:bg-green-900/20 rounded-full transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-['Inter'] font-bold text-lg text-green-900 dark:text-green-100 tracking-tight">作業を記録</h1>
</div>
<button class="bg-primary text-on-primary px-6 py-2 rounded-full font-bold text-sm shadow-md hover:opacity-90 transition-transform active:scale-95">
        保存する
    </button>
</header>
<main class="max-w-2xl mx-auto px-6 pt-8 space-y-10">
<!-- Hero Section / Tree Context -->
<section class="flex items-center gap-6 p-4 bg-surface-container-lowest rounded-2xl shadow-sm">
<div class="w-20 h-20 rounded-xl overflow-hidden flex-shrink-0">
<img alt="Close-up of a well-manicured Juniper bonsai tree with detailed bark texture and lush green needles in a ceramic pot" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCTtX5WKUviiPdzwlQ0H608wZVNFJePJr6tyI8awzPmQ1XrRBMmMt-trznaqcIhw3x6OGdDfayCmKMCYgPlkkm_B-0d8_EfJNyiyTdCvSKc3pw0U7b-Yszv3X_bE3q5HXO1DzBD9mhwXyIKa9irTd6sbb8H2eMBNJ9eD80HOQdtCVZE8m6iVz3FKFi2a9HSg0sGCU2JDOyvgzXoAFEnF3K7gFQy9p0Cu_i3Y-G-KIjyLKryDv3mGjZEMecfBNgez1v-06njxR2NofU"/>
</div>
<div>
<span class="text-[10px] font-bold uppercase tracking-wider text-secondary mb-1 block">Target Bonsai</span>
<h2 class="text-xl font-bold text-green-900">真柏 (Shimpaku Juniper)</h2>
<p class="text-sm text-on-surface-variant italic">樹齢: 12年 • 管理番号: #082</p>
</div>
</section>
<!-- Basic Info Grid -->
<section class="grid grid-cols-2 gap-4">
<div class="p-5 bg-surface-container-low rounded-2xl space-y-2">
<label class="text-[10px] font-bold uppercase tracking-wider text-secondary block">Date &amp; Time</label>
<div class="flex items-center gap-2 text-green-900 font-semibold">
<span class="material-symbols-outlined text-lg">calendar_today</span>
<span>2023.10.24</span>
</div>
</div>
<div class="p-5 bg-surface-container-low rounded-2xl space-y-2">
<label class="text-[10px] font-bold uppercase tracking-wider text-secondary block">Temperature</label>
<div class="flex items-center gap-2 text-green-900 font-semibold">
<span class="material-symbols-outlined text-lg">thermostat</span>
<span>22°C</span>
</div>
</div>
</section>
<!-- Weather Selection -->
<section class="space-y-4">
<label class="text-[10px] font-bold uppercase tracking-wider text-secondary flex items-center gap-2">
<span class="material-symbols-outlined text-sm">wb_sunny</span> Weather
        </label>
<div class="flex justify-between gap-2 overflow-x-auto no-scrollbar py-1">
<button class="flex flex-col items-center justify-center min-w-[72px] h-[72px] bg-primary-fixed text-on-primary-fixed rounded-2xl transition-all">
<span class="material-symbols-outlined">wb_sunny</span>
<span class="text-[10px] font-bold mt-1">晴れ</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[72px] h-[72px] bg-surface-container-high text-on-surface-variant rounded-2xl hover:bg-primary-fixed/30 transition-all">
<span class="material-symbols-outlined">cloud</span>
<span class="text-[10px] font-bold mt-1">曇り</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[72px] h-[72px] bg-surface-container-high text-on-surface-variant rounded-2xl hover:bg-primary-fixed/30 transition-all">
<span class="material-symbols-outlined">rainy</span>
<span class="text-[10px] font-bold mt-1">雨</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[72px] h-[72px] bg-surface-container-high text-on-surface-variant rounded-2xl hover:bg-primary-fixed/30 transition-all">
<span class="material-symbols-outlined">air</span>
<span class="text-[10px] font-bold mt-1">強風</span>
</button>
</div>
</section>
<!-- Work Type Selection (Active Context) -->
<section class="space-y-4">
<label class="text-[10px] font-bold uppercase tracking-wider text-secondary">作業種別 (Work Type)</label>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center gap-3 p-4 bg-surface-container-low text-on-surface-variant rounded-2xl hover:bg-primary-fixed/20 transition-all">
<span class="material-symbols-outlined">opacity</span>
<span class="font-bold text-sm">潅水</span>
</button>
<button class="flex items-center gap-3 p-4 bg-primary-container text-on-primary-container rounded-2xl border-2 border-primary shadow-sm transition-all ring-4 ring-primary-fixed/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">science</span>
<span class="font-bold text-sm">施肥 (Fertilizer)</span>
</button>
<button class="flex items-center gap-3 p-4 bg-surface-container-low text-on-surface-variant rounded-2xl hover:bg-primary-fixed/20 transition-all">
<span class="material-symbols-outlined">content_cut</span>
<span class="font-bold text-sm">剪定</span>
</button>
<button class="flex items-center gap-3 p-4 bg-surface-container-low text-on-surface-variant rounded-2xl hover:bg-primary-fixed/20 transition-all">
<span class="material-symbols-outlined">architecture</span>
<span class="font-bold text-sm">針金かけ</span>
</button>
</div>
</section>
<!-- Conditional Section: Fertilizer Selection -->
<section class="animate-in fade-in slide-in-from-top-4 duration-500 bg-surface-container rounded-[2rem] p-6 space-y-6">
<div class="space-y-4">
<div class="flex justify-between items-center">
<label class="text-[10px] font-bold uppercase tracking-wider text-secondary">肥料を選択 (Select Fertilizer)</label>
<span class="bg-primary text-on-primary text-[10px] px-2 py-0.5 rounded-full font-bold">REQUIRED</span>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2.5 bg-primary text-on-primary rounded-full text-sm font-bold shadow-md flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">eco</span>
                    油かす (Aburakasu)
                </button>
<button class="px-5 py-2.5 bg-surface-container-lowest text-on-surface-variant border border-outline-variant/30 rounded-full text-sm font-medium hover:bg-primary-fixed transition-colors">
                    液体肥料 A (Liquid A)
                </button>
<button class="px-5 py-2.5 bg-surface-container-lowest text-on-surface-variant border border-outline-variant/30 rounded-full text-sm font-medium hover:bg-primary-fixed transition-colors">
                    骨粉 (Bone Meal)
                </button>
<button class="px-5 py-2.5 bg-primary-fixed/30 text-primary border border-primary/20 rounded-full text-sm font-bold flex items-center gap-1 hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined text-[18px]">add</span>
                    肥料を追加 (New)
                </button>
</div>
</div>
<!-- Selected Fertilizer Details (Static Info) -->
<div class="flex items-center gap-4 p-4 bg-surface-container-low rounded-2xl border border-outline-variant/10">
<div class="flex-shrink-0 w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">analytics</span>
</div>
<div class="flex-1">
<p class="text-[10px] font-bold uppercase tracking-widest text-secondary mb-1">Component Ratio</p>
<div class="flex items-center gap-3">
<div class="flex items-center gap-1">
<span class="text-xs font-bold text-on-surface">N:</span>
<span class="text-sm font-bold text-primary">5</span>
</div>
<div class="w-px h-3 bg-outline-variant/30"></div>
<div class="flex items-center gap-1">
<span class="text-xs font-bold text-on-surface">P:</span>
<span class="text-sm font-bold text-primary">2</span>
</div>
<div class="w-px h-3 bg-outline-variant/30"></div>
<div class="flex items-center gap-1">
<span class="text-xs font-bold text-on-surface">K:</span>
<span class="text-sm font-bold text-primary">1</span>
</div>
</div>
</div>
<span class="text-[10px] font-bold px-2 py-1 bg-primary-fixed/30 text-primary rounded-lg uppercase">Organic</span>
</div>
</section>
<!-- Condition Rating -->
<section class="space-y-4">
<label class="text-[10px] font-bold uppercase tracking-wider text-secondary">Condition Rating</label>
<div class="grid grid-cols-5 gap-2">
<!-- level 1: Excellent -->
<button class="flex flex-col items-center justify-center p-2 bg-surface-container-lowest rounded-2xl border border-transparent hover:border-green-500/30 transition-all group aspect-square">
<span class="material-symbols-outlined text-2xl text-green-600/40 group-hover:text-green-600 transition-colors">sentiment_very_satisfied</span>
<span class="text-[9px] font-bold mt-1 text-on-surface-variant group-hover:text-green-700">最高</span>
</button>
<!-- level 2: Good -->
<button class="flex flex-col items-center justify-center p-2 bg-surface-container-lowest rounded-2xl border border-transparent hover:border-primary/30 transition-all group aspect-square">
<span class="material-symbols-outlined text-2xl text-primary/40 group-hover:text-primary transition-colors">sentiment_satisfied</span>
<span class="text-[9px] font-bold mt-1 text-on-surface-variant group-hover:text-primary">良好</span>
</button>
<!-- level 3: Normal (Active) -->
<button class="flex flex-col items-center justify-center p-2 bg-stone-100 dark:bg-stone-800 rounded-2xl border-2 border-stone-300 dark:border-stone-600 ring-4 ring-stone-200/50 dark:ring-stone-700/50 transition-all aspect-square">
<span class="material-symbols-outlined text-2xl text-stone-600 dark:text-stone-300" style="font-variation-settings: 'FILL' 1;">sentiment_neutral</span>
<span class="text-[9px] font-bold mt-1 text-stone-700 dark:text-stone-200">普通</span>
</button>
<!-- level 4: Warning -->
<button class="flex flex-col items-center justify-center p-2 bg-surface-container-lowest rounded-2xl border border-transparent hover:border-amber-500/30 transition-all group aspect-square">
<span class="material-symbols-outlined text-2xl text-amber-600/30 group-hover:text-amber-500 transition-colors">sentiment_dissatisfied</span>
<span class="text-[9px] font-bold mt-1 text-on-surface-variant group-hover:text-amber-700">要注意</span>
</button>
<!-- level 5: Bad -->
<button class="flex flex-col items-center justify-center p-2 bg-surface-container-lowest rounded-2xl border border-transparent hover:border-error/30 transition-all group aspect-square">
<span class="material-symbols-outlined text-2xl text-error/30 group-hover:text-error transition-colors">sentiment_very_dissatisfied</span>
<span class="text-[9px] font-bold mt-1 text-on-surface-variant group-hover:text-error">不調</span>
</button>
</div>
</section>
<!-- Memo & Photo Section -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-8 pb-12">
<div class="space-y-4">
<label class="text-[10px] font-bold uppercase tracking-wider text-secondary">メモ (Logs &amp; Memo)</label>
<textarea class="w-full h-40 bg-surface-container-low border-none rounded-3xl p-6 text-sm placeholder:text-stone-400 focus:ring-2 focus:ring-primary/20 resize-none" placeholder="作業のポイントや気づいた点などを入力..."></textarea>
</div>
<div class="space-y-4">
<label class="text-[10px] font-bold uppercase tracking-wider text-secondary">Photo Documentation</label>
<div class="w-full h-40 bg-surface-container-low rounded-3xl border-2 border-dashed border-outline-variant/30 flex flex-col items-center justify-center gap-2 hover:bg-surface-container-high transition-colors cursor-pointer group">
<div class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary">add_a_photo</span>
</div>
<span class="text-xs font-bold text-on-surface-variant">写真を撮る・アップロード</span>
</div>
</div>
</section>
</main>
</body></html>
